name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

env:
  JAVA_VERSION: "17"

jobs:
  detekt:
    name: detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Restores/saves ~/.gradle: dependency cache (caches/modules-2), wrapper dists, transforms, local build cache.
          gradle-home-cache-includes: |
            caches
            notifications
          cache-cleanup: on-success

      - name: Write gradle.properties (remote secrets)
        env:
          EXCHANGE_BASE_URL: ${{ secrets.EXCHANGE_BASE_URL }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ENDPOINT_ACCESS_KEY: ${{ secrets.MINIO_ENDPOINT_ACCESS_KEY }}
          MINIO_ENDPOINT_SECRET_KEY: ${{ secrets.MINIO_ENDPOINT_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
        run: |
          chmod +x ./scripts/ci/write-gradle-properties.sh
          ./scripts/ci/write-gradle-properties.sh

      - name: Run detekt
        run: ./gradlew detekt mergeDetektReports

      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/detekt-report.sarif

      - name: Upload detekt reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/*.html
            **/build/reports/detekt/*.sarif

  android_pr:
    name: android (PR debug)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications
          cache-cleanup: on-success

      - name: Write gradle.properties (remote secrets)
        env:
          EXCHANGE_BASE_URL: ${{ secrets.EXCHANGE_BASE_URL }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ENDPOINT_ACCESS_KEY: ${{ secrets.MINIO_ENDPOINT_ACCESS_KEY }}
          MINIO_ENDPOINT_SECRET_KEY: ${{ secrets.MINIO_ENDPOINT_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
        run: |
          chmod +x ./scripts/ci/write-gradle-properties.sh
          ./scripts/ci/write-gradle-properties.sh

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  android_release:
    name: android (main release)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications
          cache-cleanup: on-success

      - name: Write gradle.properties (remote secrets)
        env:
          EXCHANGE_BASE_URL: ${{ secrets.EXCHANGE_BASE_URL }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ENDPOINT_ACCESS_KEY: ${{ secrets.MINIO_ENDPOINT_ACCESS_KEY }}
          MINIO_ENDPOINT_SECRET_KEY: ${{ secrets.MINIO_ENDPOINT_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
        run: |
          chmod +x ./scripts/ci/write-gradle-properties.sh
          ./scripts/ci/write-gradle-properties.sh

      - name: Decode Android keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_RELEASE_KEYSTORE_BASE64"
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Write Android signing properties
        env:
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p "$HOME/.gradle"
          {
            echo "android.release.storeFile=$RUNNER_TEMP/release.keystore"
            echo "android.release.storePassword=$ANDROID_RELEASE_KEYSTORE_PASSWORD"
            echo "android.release.keyAlias=$ANDROID_RELEASE_KEY_ALIAS"
            echo "android.release.keyPassword=$ANDROID_RELEASE_KEY_PASSWORD"
          } >> "$HOME/.gradle/gradle.properties"

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

