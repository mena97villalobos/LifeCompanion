# CodeQL for LifeCompanion: Gradle (KMP/Android) + Swift iOS host with ComposeApp framework.
# Manual builds mirror .github/workflows/ci.yml (JDK 17, write-gradle-properties.sh).
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 19 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up shared Gradle build environment
        if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
        uses: ./.github/actions/setup-gradle-build-env
        with:
          java-version: ${{ env.JAVA_VERSION }}
          exchange-base-url: ${{ secrets.EXCHANGE_BASE_URL }}
          exchange-api-key: ${{ secrets.EXCHANGE_API_KEY }}
          minio-endpoint: ${{ secrets.MINIO_ENDPOINT }}
          minio-endpoint-access-key: ${{ secrets.MINIO_ENDPOINT_ACCESS_KEY }}
          minio-endpoint-secret-key: ${{ secrets.MINIO_ENDPOINT_SECRET_KEY }}
          minio-bucket-name: ${{ secrets.MINIO_BUCKET_NAME }}
          google-services-json-base64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Build Android (Gradle)
        if: matrix.language == 'java-kotlin'
        run: |
          ./gradlew \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache \
            --rerun-tasks \
            clean \
            :app:assembleDebug \
            :composeApp:compileAndroidMain \
            :design-system:compileAndroidMain \
            :domain:compileAndroidMain \
            :data:local:compileAndroidMain \
            :data:remote:compileAndroidMain

      - name: Build ComposeApp framework and iOS app (Swift)
        if: matrix.language == 'swift'
        run: |
          set -euo pipefail
          ./gradlew --no-configuration-cache :composeApp:linkDebugFrameworkIosSimulatorArm64
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          (cd iosApp && xcodegen generate)
          xcodebuild \
            -project "iosApp/LifeCompanion.xcodeproj" \
            -scheme "LifeCompanion" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
