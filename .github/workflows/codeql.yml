# CodeQL for LifeCompanion: Gradle (KMP/Android) + Swift iOS host with ComposeApp framework.
# Manual builds mirror .github/workflows/ci.yml (JDK 17, write-gradle-properties.sh).
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 19 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up JDK
        if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications
          cache-cleanup: on-success

      - name: Write gradle.properties (remote secrets)
        if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
        env:
          EXCHANGE_BASE_URL: ${{ secrets.EXCHANGE_BASE_URL }}
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ENDPOINT_ACCESS_KEY: ${{ secrets.MINIO_ENDPOINT_ACCESS_KEY }}
          MINIO_ENDPOINT_SECRET_KEY: ${{ secrets.MINIO_ENDPOINT_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
        run: |
          chmod +x ./scripts/ci/write-gradle-properties.sh
          ./scripts/ci/write-gradle-properties.sh

      - name: Decode google-services.json
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Build Android (Gradle)
        if: matrix.language == 'java-kotlin'
        run: ./gradlew --no-configuration-cache :app:assembleDebug

      - name: Build ComposeApp framework and iOS app (Swift)
        if: matrix.language == 'swift'
        run: |
          set -euo pipefail
          ./gradlew --no-configuration-cache :composeApp:linkDebugFrameworkIosSimulatorArm64
          arch -arm64 brew install xcodegen
          (cd iosApp && xcodegen generate)
          xcodebuild \
            -project "iosApp/LifeCompanion.xcodeproj" \
            -scheme "LifeCompanion" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
