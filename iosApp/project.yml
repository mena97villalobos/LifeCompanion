# Install XcodeGen: brew install xcodegen
# Then: cd iosApp && xcodegen generate && open LifeCompanion.xcodeproj
# Before first run, build the Kotlin framework:
#   ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
# (Use linkDebugFrameworkIosArm64 for a physical device.)
name: LifeCompanion
options:
  bundleIdPrefix: com.mena97villalobos
  deploymentTarget:
    iOS: "17.0"
# Sentry Cocoa is linked via SPM so the Kotlin/Native crash-reporting symbols (from
# sentry-kotlin-multiplatform, pinned to Sentry Cocoa 8.38.0) resolve at app link time.
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    exactVersion: 8.38.0
settings:
  base:
    FRAMEWORK_SEARCH_PATHS: "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework $(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework $(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/releaseFramework $(SRCROOT)/../composeApp/build/bin/iosArm64/releaseFramework"
    OTHER_LDFLAGS: "$(inherited) -framework ComposeApp"
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
targets:
  LifeCompanion:
    type: application
    platform: iOS
    sources:
      - path: LifeCompanion
    dependencies:
      - package: Sentry
        product: Sentry
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mena97villalobos.lifecompanion.ios
      INFOPLIST_FILE: LifeCompanion/Info.plist
